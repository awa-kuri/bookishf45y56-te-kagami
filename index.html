<html lang="ja">

    <style>
        :root {
            --bg-night: #1a1f2e;
            --bg-dawn: #2a3045;
            --card: rgba(255,255,255,0.04);
            --card-border: rgba(255,255,255,0.08);
            --card-glow: rgba(140,160,200,0.06);
            --text: #d4dae8;
            --text-secondary: #8a95ab;
            --text-muted: #5a6478;
            --text-faint: #3d4558;
            --indigo: #7b8ec8;
            --indigo-soft: rgba(123,142,200,0.15);
            --indigo-glow: rgba(123,142,200,0.08);
            --warm: #c8a87b;
            --warm-soft: rgba(200,168,123,0.12);
            --frost: #8bbcd0;
            --frost-soft: rgba(139,188,208,0.12);
            --coral: #d08888;
            --coral-soft: rgba(208,136,136,0.12);
        }
        * { margin:0; padding:0; box-sizing:border-box; }


html, body {
  background: #1a1f2e; /* グラデーションの開始色と同じにする */
  margin: 0;
  padding: 0;
  height: 100%;
  width: 100%;
}

        body {
            font-family:'Zen Kaku Gothic New','Hiragino Sans',sans-serif;
content: "";
  position: fixed; /* 画面に固定 */
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
            background:linear-gradient(170deg, #1a1f2e 0%, #222840 40%, #2a3352 100%);
            color:var(--text); line-height:1.7; min-height:100vh;
            overflow-x:hidden; -webkit-text-size-adjust:100%;
z-index: -1; /* コンテンツの裏側に回す */
        }

        .container { max-width:460px; margin:0 auto; padding:0 18px 80px;
            padding-top: env(safe-area-inset-top);
position: relative;
  z-index: 1;

 }



.header{
  display: flex;
  justify-content:space-between;
  height: 200px;
  padding:20px 0px 10px;
  padding-top: 80px;
  margin-inline: auto;
text-align:center;
  width: 100%;
  position:relative;
 }

.header-1{
align-self: flex-end;
padding-bottom: 5px;
padding-left: 4px;
 }

.header-2{
align-self: flex-start;
padding-right: 20px;
 }

        .header h1 {
            font-family:'Zen Old Mincho',serif;
            font-size:20px; font-weight:400; text-align:left;
            letter-spacing:0.8em; color:var(--indigo);
        }
        .header-sub {
            font-size:11px; color:var(--text-muted);
            margin-top:2px; letter-spacing:0.08em; text-align:left;
        }
        .header-moon {
            margin:0 auto 8px;
            width:60px; height:60px; align:right;
            filter:drop-shadow(0 0 12px rgba(180,195,230,0.3));
        }
        .header-moon-name {
            font-family:'Zen Old Mincho',serif;
            font-size:11px; color:var(--text-muted);
            margin-top:4px; letter-spacing:0.3em;
        }

        /* ===== Weather Section ===== */
        .weather-section { margin-bottom:16px; }
        .weather-grid {
            display:grid; grid-template-columns:1fr 1fr; gap:8px;
            margin-bottom:10px;
        }
        .weather-card {
            background:var(--card); border:1px solid var(--card-border);
            border-radius:14px; padding:14px;
            box-shadow:0 4px 20px var(--card-glow);
            position:relative; overflow:hidden;
        }
        .weather-card.sub { opacity:0.8; }
        .weather-card::after {
            content:''; position:absolute; top:0; right:0;
            width:80px; height:80px; border-radius:50%;
            background:radial-gradient(circle, var(--indigo-glow) 0%, transparent 70%);
            pointer-events:none;
        }
        .weather-date {
            font-size:11px; color:var(--text-secondary);
            margin-bottom:8px; letter-spacing:0.04em;
        }
        .weather-main {
            display:flex; align-items:center; gap:10px; margin-bottom:8px;
        }
        .weather-icon { font-size:32px; line-height:1; }
        .weather-temp {
            font-family:'Zen Old Mincho',serif;
            font-size:24px; color:var(--text); line-height:1.1;
        }
        .weather-temp span { font-size:13px; color:var(--text-secondary); }
        .weather-desc {
            font-size:11px; color:var(--text-muted); margin-bottom:6px;
        }
        .weather-stats {
            display:flex; gap:8px; font-size:11px;
        }
        .weather-stat {
            background:rgba(255,255,255,0.02);
            border:1px solid rgba(255,255,255,0.05);
            border-radius:6px; padding:4px 8px; text-align:center; flex:1;
        }
        .weather-stat-label { font-size:9px; color:var(--text-muted); }
        .weather-stat-value { font-size:12px; color:var(--text-secondary); font-weight:500; }

        .weather-alerts {
            margin-top:0; display:flex; flex-direction:column; gap:4px;
        }
        .weather-alert {
            font-size:11px; padding:6px 10px; border-radius:6px;
            line-height:1.6;
        }
        .weather-alert.pressure { background:var(--indigo-soft); color:var(--indigo); }
        .weather-alert.tempdiff { background:var(--coral-soft); color:var(--coral); }
        .weather-alert.humid { background:var(--frost-soft); color:var(--frost); }
        .weather-alert.rain { background:var(--warm-soft); color:var(--warm); }

        .weather-comment {
            background:var(--card); border:1px solid var(--card-border);
            border-radius:10px; padding:10px 12px;
            font-size:12px; color:var(--text-secondary);
            line-height:1.8; margin-bottom:14px;
        }

        .weather-loading {
            text-align:center; padding:40px; color:var(--text-muted); font-size:13px;
        }

        /* ===== Sun Info ===== */
        .sun-bar {
            display:flex; justify-content:center; gap:16px;
            font-size:11px; color:var(--text-muted);
            margin-bottom:12px; padding:6px 0;
        }
        .sun-bar span { color:var(--text-secondary); }

        /* ===== Quote Section ===== */
        .quote-section { margin-bottom:16px; }
        .quote-card {
            background:linear-gradient(135deg, rgba(123,142,200,0.06) 0%, rgba(200,168,123,0.04) 100%);
            border:1px solid var(--card-border);
            border-radius:14px; padding:20px 18px;
            text-align:center; position:relative;
            box-shadow:0 4px 24px rgba(0,0,0,0.15);
        }
        .quote-label {
            font-size:10px; color:var(--text-muted);
            letter-spacing:0.15em; margin-bottom:10px;
        }
        .quote-text {
            font-family:'Zen Old Mincho',serif;
            font-size:16px; font-weight:400;
            color:var(--text); line-height:1.9;
            letter-spacing:0.06em;
        }
        .quote-category {
            font-size:10px; color:var(--text-muted);
            margin-top:10px;
        }
        .quote-actions {
            display:flex; justify-content:center; gap:12px; margin-top:16px;
        }
        .quote-btn {
            padding:6px 16px; border-radius:16px;
            border:1px solid var(--card-border);
            background:transparent; color:var(--text-muted);
            font-size:11px; font-family:inherit; cursor:pointer;
            transition:all 0.2s;
        }
        .quote-btn.saved { border-color:var(--warm); color:var(--warm); }

        /* ===== Trivia Section ===== */
        .trivia-card {
            background:var(--card); border:1px solid var(--card-border);
            border-radius:10px; padding:10px 14px;
            font-size:12px; color:var(--text-secondary);
            line-height:1.7; margin-bottom:14px;
        }
        .trivia-label {
            font-size:10px; color:var(--text-muted);
            letter-spacing:0.1em; margin-bottom:4px;
        }

        /* ===== Favorites ===== */
        .fav-section { margin-top:24px; border-top:1px solid var(--card-border); padding-top:18px; }
        .fav-title { font-size:11px; color:var(--text-muted); letter-spacing:0.08em; margin-bottom:10px; }
        .fav-item {
            background:var(--card); border:1px solid var(--card-border);
            border-radius:10px; padding:12px 14px; margin-bottom:6px;
            display:flex; justify-content:space-between; align-items:center;
        }
        .fav-text {
            font-family:'Zen Old Mincho',serif;
            font-size:13px; color:var(--text); line-height:1.8; flex:1;
        }
        .fav-remove {
            background:none; border:none; color:var(--text-muted);
            cursor:pointer; font-size:14px; padding:4px 8px; flex:none;
        }

        .toast {
            position:fixed; top:20px; left:50%; transform:translateX(-50%);
            max-width:88%; background:var(--bg-dawn); border:1px solid var(--indigo);
            border-radius:12px; padding:12px 22px;
            color:var(--text-secondary); font-size:13px;
            box-shadow:0 4px 20px rgba(123,142,200,0.2);
            opacity:0; transition:opacity 0.3s; pointer-events:none; z-index:100;
            text-align:center;

function getJSTHour(){return getJST().getHours();}
function isEvening(){const h=getJSTHour();return h>=17||h<5;}
function formatDateJP(ds){const d=new Date(ds+'T00:00:00+09:00');const w='日月火水木金土'[d.getDay()];return`${d.getMonth()+1}月${d.getDate()}日（${w}）`;}
function pick(a){return a[Math.floor(Math.random()*a.length)];}

/* ========================================
   Weather Comments
======================================== */
function getWeatherComments(data){
    const comments=[];
    // Pressure change
    if(data.pressureChange!==null){
        const pc=data.pressureChange;
        if(pc<=-5) comments.push({type:'pressure',text:`気圧が${Math.abs(Math.round(pc))}hPa下がっている。頭痛や浮腫みに注意せよ。無理はするな。`});
        else if(pc<=-3) comments.push({type:'pressure',text:`気圧がやや低下（${Math.round(pc)}hPa）。体調の変化に気を配れ。`});
        else if(pc>=5) comments.push({type:'pressure',text:`気圧が${Math.round(pc)}hPa上昇。身体は楽になるはずだ。`});
    }
    // Temp diff within day
    const diff=data.days[0].tempMax-data.days[0].tempMin;
    if(diff>=12) comments.push({type:'tempdiff',text:`寒暖差${Math.round(diff)}℃。寒暖差疲労に警戒せよ。脱ぎ着できる服装で。`});
    else if(diff>=8) comments.push({type:'tempdiff',text:`寒暖差${Math.round(diff)}℃。上着の準備を。`});
    // Temp diff vs yesterday
    if(data.yesterdayMax!==null){
        const ydiff=data.days[0].tempMax-data.yesterdayMax;
        if(ydiff<=-5) comments.push({type:'tempdiff',text:`昨日より${Math.abs(Math.round(ydiff))}℃低い。冷えに備えよ。`});
        else if(ydiff>=5) comments.push({type:'tempdiff',text:`昨日より${Math.round(ydiff)}℃高い。脱水に注意。水分を摂れ。`});
    }
    // Rain
    if(data.days[0].precipProb>=60) comments.push({type:'rain',text:`降水確率${data.days[0].precipProb}%。傘を持て。`});
    else if(data.days[0].precipProb>=30) comments.push({type:'rain',text:`雨の可能性あり（${data.days[0].precipProb}%）。折り畳み傘があると安心だ。`});

    if(comments.length===0) comments.push({type:'pressure',text:'気象条件は穏やかだ。よい日である。'});
    return comments;
}

/* ========================================
   Fetch Weather
======================================== */
async function fetchWeather(){
    try{
        const url=`https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LNG}&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max,weathercode,sunrise,sunset&hourly=surface_pressure&timezone=Asia/Tokyo&past_days=1&forecast_days=3`;
        const res=await fetch(url);
        const json=await res.json();

        const daily=json.daily;
        const hourly=json.hourly;

        const days=[];
        for(let i=1;i<daily.time.length;i++){
            days.push({
                date:daily.time[i],
                tempMax:daily.temperature_2m_max[i],
                tempMin:daily.temperature_2m_min[i],
                precipProb:daily.precipitation_probability_max[i],
                weatherCode:daily.weathercode[i],
                sunrise:daily.sunrise?daily.sunrise[i]:null,
                sunset:daily.sunset?daily.sunset[i]:null,
            });
        }
        // Yesterday's sunrise/sunset for day length comparison
        const yesterSunrise=daily.sunrise?daily.sunrise[0]:null;
        const yesterSunset=daily.sunset?daily.sunset[0]:null;

        // Pressure change
        const todayStr=daily.time[1];
        let todayP=[],yesterP=[];
        const yesterStr=daily.time[0];
        hourly.time.forEach((t,i)=>{
            const h=parseInt(t.split('T')[1]);
            if(t.startsWith(todayStr)&&h>=6&&h<=12) todayP.push(hourly.surface_pressure[i]);
            if(t.startsWith(yesterStr)&&h>=6&&h<=12) yesterP.push(hourly.surface_pressure[i]);
        });
        const avgToday=todayP.length?todayP.reduce((a,b)=>a+b)/todayP.length:null;
        const avgYester=yesterP.length?yesterP.reduce((a,b)=>a+b)/yesterP.length:null;
        const pressureChange=(avgToday&&avgYester)?avgToday-avgYester:null;
        const currentPressure=avgToday?Math.round(avgToday):null;

        const yesterdayMax=daily.temperature_2m_max[0];

        return{days,pressureChange,currentPressure,yesterdayMax,yesterSunrise,yesterSunset};
    }catch(e){
        console.error('Weather fetch failed:',e);
        return null;
    }
}

function renderHeader(){
    const now=getJST();
    const dateStr=`${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日（${'日月火水木金土'[now.getDay()]}）`;
    const h=now.getHours();
    let timeLabel='';
    if(h>=5&&h<11) timeLabel='朝';
    else if(h>=11&&h<17) timeLabel='昼';
    else if(h>=17&&h<22) timeLabel='夕';
    else timeLabel='夜';
    document.getElementById('header-date').textContent=`${dateStr} ${timeLabel}`;
}

function renderWeather(data){
    const area=document.getElementById('weather-area');
    const commentArea=document.getElementById('weather-comment-area');

    if(!data){
        area.innerHTML='<div class="weather-loading">天気の取得に失敗した。オフラインか。</div>';
        commentArea.innerHTML='';
        return;
    }

    const evening=isEvening();
    // Morning: today + tomorrow, Evening: tomorrow + day after
    const showDays=evening?[data.days[1],data.days[2]]:[data.days[0],data.days[1]];
    const labels=evening?['明日','明後日']:['今日','明日'];

    let html='<div class="weather-grid">';
    showDays.forEach((day,i)=>{
        if(!day)return;
        const icon=WEATHER_ICONS[day.weatherCode]||'🌤️';
        const desc=WEATHER_DESC[day.weatherCode]||'';
        const diff=Math.round(day.tempMax-day.tempMin);
        html+=`
        <div class="weather-card${i>0?' sub':''}">
            <div class="weather-date">${labels[i]}　${formatDateJP(day.date)}</div>
            <div class="weather-main">
                <div class="weather-icon">${icon}</div>
                <div>
                    <div class="weather-temp">${Math.round(day.tempMax)}°<span>/${Math.round(day.tempMin)}°</span></div>
                </div>
            </div>
            <div class="weather-desc">${desc}　寒暖差${diff}℃</div>
            <div class="weather-stats">
                <div class="weather-stat"><div class="weather-stat-label">降水</div><div class="weather-stat-value">${day.precipProb}%</div></div>
                <div class="weather-stat"><div class="weather-stat-label">気圧</div><div class="weather-stat-value">${i===0&&data.currentPressure?data.currentPressure:'—'}</div></div>
            </div>
        </div>`;
    });
    html+='</div>';
    area.innerHTML=html;

    // Weather comments (alerts)
    const comments=getWeatherComments(data);
    let commentHtml='<div class="weather-comment">';
    comments.forEach(c=>{commentHtml+=`<div class="weather-alert ${c.type}">${c.text}</div>`;});
    commentHtml+='</div>';
    commentArea.innerHTML=commentHtml;
}

/* ========================================
   Moon Phase & Celestial
======================================== */
function getMoonPhase(date){
    // Simple moon phase calculation (Trig method approximation)
    const d=date||getJST();
    const year=d.getFullYear(),month=d.getMonth()+1,day=d.getDate();
    // Reference new moon: 2000-01-06
    const refNew=new Date(2000,0,6).getTime();
    const now=new Date(year,month-1,day).getTime();
    const synodicMonth=29.53058867;
    const daysSince=(now-refNew)/(1000*60*60*24);
    const phase=((daysSince%synodicMonth)+synodicMonth)%synodicMonth;
    return phase; // 0=new moon, ~7.4=first quarter, ~14.8=full, ~22.1=last quarter
}

function getMoonName(phase){
    if(phase<1.85) return '新月';
    if(phase<5.53) return '三日月';
    if(phase<9.22) return '上弦';
    if(phase<12.91) return '十日夜';
    if(phase<16.61) return '満月';
    if(phase<20.30) return '寝待月';
    if(phase<23.99) return '下弦';
    if(phase<27.68) return '有明月';
    return '新月';
}

function drawMoonSVG(phase,size){
    const s=size||60, r=s/2-3, cx=s/2, cy=s/2;
    // Normalize: 0=new, 0.5=full, 1=new again
    const p=phase/29.53058867;
    // Illumination: 0 at new, 1 at full
    const illum=0.5*(1-Math.cos(2*Math.PI*p));
    // Which side is lit: waxing (right), waning (left)
    const isWaxing=p<=0.5;

    // Terminator ellipse rx: when illum=0 rx=r (covers all), illum=0.5 rx=0, illum=1 rx=r
    const terminatorRx=Math.abs(2*illum-1)*r;
    // Sweep: concave (illum<0.5) or convex (illum>0.5)
    const convex=illum>=0.5;

    let svg=`<svg width="${s}" height="${s}" viewBox="0 0 ${s} ${s}">`;
    // Dark base
    svg+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="#252d42"/>`;

    if(illum<0.01){
        // New moon - just dark circle with subtle rim
        svg+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#3a4560" stroke-width="0.5"/>`;
    } else if(illum>0.99){
        // Full moon
        svg+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="#d8dfe8" opacity="0.92"/>`;
    } else if(isWaxing){
        // Right side lit
        const sf=convex?1:0;
        svg+=`<path d="M${cx},${cy-r} A${r},${r} 0 0,1 ${cx},${cy+r} A${Math.max(terminatorRx,0.1)},${r} 0 0,${sf} ${cx},${cy-r}" fill="#d8dfe8" opacity="0.92"/>`;
    } else {
        // Left side lit (waning)
        const sf=convex?0:1;
        svg+=`<path d="M${cx},${cy-r} A${r},${r} 0 0,0 ${cx},${cy+r} A${Math.max(terminatorRx,0.1)},${r} 0 0,${sf} ${cx},${cy-r}" fill="#d8dfe8" opacity="0.92"/>`;
    }
    // Subtle glow
    svg+=`<circle cx="${cx}" cy="${cy}" r="${r+1}" fill="none" stroke="rgba(180,195,230,0.15)" stroke-width="1"/>`;
    svg+=`</svg>`;
    return svg;
}

function renderMoonHeader(){
    const phase=getMoonPhase();
    const moonName=getMoonName(phase);
    document.getElementById('header-moon').innerHTML=drawMoonSVG(phase,60);
    document.getElementById('header-moon-name').textContent=moonName;
}

function renderCelestial(weatherData){
    const area=document.getElementById('celestial-area');
    if(!weatherData||!weatherData.days[0]){area.innerHTML='';return;}

    const day=weatherData.days[0];
    let sunriseStr='—',sunsetStr='—',dayLenStr='',dayDiffStr='';

    if(day.sunrise){const sr=day.sunrise.split('T')[1];sunriseStr=sr?sr.slice(0,5):'—';}
    if(day.sunset){const ss=day.sunset.split('T')[1];sunsetStr=ss?ss.slice(0,5):'—';}
    if(day.sunrise&&day.sunset){
        const srTime=new Date(day.sunrise).getTime();
        const ssTime=new Date(day.sunset).getTime();
        const mins=Math.round((ssTime-srTime)/(1000*60));
        const h=Math.floor(mins/60),m=mins%60;
        dayLenStr=`${h}h${m}m`;
        if(weatherData.yesterSunrise&&weatherData.yesterSunset){
            const ySr=new Date(weatherData.yesterSunrise).getTime();
            const ySs=new Date(weatherData.yesterSunset).getTime();
            const yMins=Math.round((ySs-ySr)/(1000*60));
            const diff=mins-yMins;
            if(diff>0) dayDiffStr=`(+${diff}分)`;
            else if(diff<0) dayDiffStr=`(${diff}分)`;
        }
    }

//    area.innerHTML=`<div class="sun-bar">☀ <span>${sunriseStr}</span>　🌙 <span>${sunsetStr}</span>　// ${dayLenStr} ${dayDiffStr}</div>`;
}

function renderQuote(){
    const section=document.getElementById('quote-section');
    const today=getJSTDate();
    const mmdd=today.slice(5); // "MM-DD"

    // 二十四節気の日は専用コメントを使う
    let quote;
    if(SEKKI_QUOTES[mmdd]){
        quote=SEKKI_QUOTES[mmdd];
    } else {
        const rng=seededRandom(today);
        const idx=Math.floor(rng()*QUOTES.length);
        quote=QUOTES[idx];
    }

    const favs=JSON.parse(localStorage.getItem('tekagamiFavs')||'[]');
    const isSaved=favs.some(f=>f.text===quote.text);

    section.innerHTML=`
    <div class="quote-card">
        <div class="quote-label">今日の一言</div>
        <div class="quote-text">${quote.text}</div>
        <div class="quote-category">── ${quote.cat}</div>
        <div class="quote-actions">
            <button class="quote-btn ${isSaved?'saved':''}" onclick="toggleFav('${quote.text.replace(/'/g,"\\'")}','${quote.cat}')">${isSaved?'★ 保存済':'☆ 保存する'}</button>
        </div>
    </div>`;
}

function renderTrivia(){
    const area=document.getElementById('trivia-area');
    const now=getJST();
    const key=String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0');
    const trivia=TRIVIA[key];
    if(!trivia){area.innerHTML='';return;}
    const dateLabel=`${now.getMonth()+1}月${now.getDate()}日`;
    area.innerHTML=`
    <div class="trivia-card">
        <div class="trivia-label">今日は何の日 ── ${dateLabel}</div>
        ${trivia}
    </div>`;
}

function renderFavorites(){
    const area=document.getElementById('fav-area');
    const favs=JSON.parse(localStorage.getItem('tekagamiFavs')||'[]');
    if(!favs.length){area.innerHTML='';return;}
    let html='<div class="fav-section"><div class="fav-title">保存した言葉</div>';
    favs.forEach((f,i)=>{
        html+=`<div class="fav-item"><div class="fav-text">${f.text}</div><button class="fav-remove" onclick="removeFav(${i})">✕</button></div>`;
    });
    html+='</div>';
    area.innerHTML=html;
}

function toggleFav(text,cat){
    let favs=JSON.parse(localStorage.getItem('tekagamiFavs')||'[]');
    const idx=favs.findIndex(f=>f.text===text);
    if(idx>=0){favs.splice(idx,1);showToast('保存を解除した。');}
    else{favs.push({text,cat});showToast('保存した。');}
    localStorage.setItem('tekagamiFavs',JSON.stringify(favs));
    renderQuote();
    renderFavorites();
}

function removeFav(i){
    let favs=JSON.parse(localStorage.getItem('tekagamiFavs')||'[]');
    favs.splice(i,1);
    localStorage.setItem('tekagamiFavs',JSON.stringify(favs));
    renderQuote();
    renderFavorites();
    showToast('削除した。');
}

   Init
======================================== */
async function init(){
    renderHeader();
    renderMoonHeader();
    renderQuote();
    renderTrivia();
    renderFavorites();
    renderCelestial(null);
    const data=await fetchWeather();
    renderWeather(data);
    renderCelestial(data);
}
init();

// 画面復帰時に日付が変わっていたら再描画
let lastDate = getJSTDate();
document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') {
        const now = getJSTDate();
        if (now !== lastDate) {
            lastDate = now;
            init();
        }
    }
});
